name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: node --test

      # Enforce the test ledger: the numbers committed in .wiki/tests.md must
      # match a fresh run. Fails the PR if they drifted (or were never recorded).
      - name: Verify test ledger is current
        run: node bin/wikify.js test --root . --check

      - name: Wiki health
        run: node bin/wikify.js health --root .

      - name: Secret audit
        run: node bin/wikify.js audit --root .
